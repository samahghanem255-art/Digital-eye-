<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Eye</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

<div class="logo-area">
<img src="https://i.ibb.co/bgV5NSrN/att-q74v-KAKLLei-LL4aq-NBv68need-BE5F8mi-KOl-Ba-E2-DOfc.jpg" class="logo-img">
<h2>Digital Eye</h2>
</div>

<nav>
<a href="#home">الرئيسية</a>
<a href="#services">الخدمات</a>
<a href="#contact">تواصل</a>
</nav>

<div class="actions">
<button onclick="toggleTheme()">🌙</button>
<button onclick="toggleLang()">EN</button>
</div>

</header>

<!-- HERO -->
<section id="home" class="hero">

<h1>عين واحدة... رؤية كاملة</h1>
<p>منصة إعلامية ذكية بالذكاء الاصطناعي</p>

<button onclick="go()">ابدأ</button>

</section>

<!-- SERVICES -->
<section id="services" class="services">

<h2>الخدمات</h2>

<div class="grid">

<div class="card">📰 توليد الأخبار</div>
<div class="card">📊 تحليل المحتوى</div>
<div class="card">✅ التحقق من الأخبار</div>
<div class="card">🏢 مراقبة السمعة</div>

</div>

</section>

<!-- CONTACT -->
<section id="contact" class="contact">

<h2>تواصل معنا</h2>

<div class="box">

<input placeholder="الاسم">
<input placeholder="البريد">
<textarea placeholder="رسالتك"></textarea>

<button>إرسال</button>

</div>

</section>

<footer>
Digital Eye © 2026
</footer>

<script src="app.js"></script>
</body>

</html>
