<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Eye</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<header class="navbar">

<div class="logo-area">
<img src="https://i.ibb.co/bgV5NSrN/att-q74v-KAKLLei-LL4aq-NBv68need-BE5F8mi-KOl-Ba-E2-DOfc.jpg" class="logo">
<h2>Digital Eye</h2>
</div>

<nav>
<a href="#home">الرئيسية</a>
<a href="#services">الخدمات</a>
<a href="#ai">الذكاء</a>
<a href="#contact">تواصل</a>
</nav>

<div class="actions">
<button onclick="toggleTheme()">🌙</button>
<button onclick="toggleLang()">EN</button>
</div>

</header>

<!-- HERO -->
<section id="home" class="hero">
<h1>عين واحدة... رؤية كاملة</h1>
<p>منصة إعلامية ذكية بالذكاء الاصطناعي</p>
</section>

<!-- SERVICES -->
<section id="services" class="services">

<h2>الخدمات</h2>

<div class="grid">

<div class="card">📰 توليد الأخبار</div>
<div class="card">📊 تحليل المحتوى</div>
<div class="card">✅ التحقق من الأخبار</div>
<div class="card">🏢 مراقبة السمعة</div>

</div>

<!-- CHART -->
<div id="chart1" class="chart"></div>

</section>

<!-- AI DASHBOARD -->
<section id="ai" class="ai">

<h2>الذكاء الاصطناعي</h2>

<div class="box">

<input id="nlpInput" placeholder="أدخل نص لتحسينه">
<button onclick="runNLP()">تحسين النص</button>
<div id="nlpOutput" class="output"></div>

</div>

<div class="box">

<select id="contentType">
<option>خبر</option>
<option>مقال</option>
</select>

<select id="contentCat">
<option>رياضة</option>
<option>صحة</option>
<option>تكنولوجيا</option>
</select>

<input id="contentTopic" placeholder="الموضوع">
<button onclick="generateContent()">توليد محتوى</button>

<div id="genLoading" class="output">جاري التحميل...</div>
<div id="genOutput" class="output">
<div id="genText"></div>
<button onclick="copyContent(event)">نسخ</button>
</div>

</div>

<div class="box">

<input id="analyzeInput" placeholder="عنوان خبر">
<button onclick="analyzeAudience()">تحليل الجمهور</button>

<div id="analyzeOutput" class="output">
<div id="analyzeAIText"></div>

<div>
<span id="scoreViews"></span>
<span id="scoreEngage"></span>
<span id="scoreShare"></span>
</div>

</div>

</div>

</section>

<!-- CONTACT -->
<section id="contact" class="contact">

<h2>تواصل معنا</h2>

<input placeholder="الاسم">
<input placeholder="البريد">
<textarea placeholder="الرسالة"></textarea>

<button>إرسال</button>

</section>

<footer>
Digital Eye © 2026
</footer>

<script src="app.js"></script>
</body>

</html>
