<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI Services</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ===== CHART SECTION ===== -->
  <section class="box">
    <h2>إحصائيات الذكاء الاصطناعي</h2>

    <div id="chart1" class="chart"></div>

    <button onclick="buildChart()" class="btn">
      تشغيل الإحصائيات
    </button>
  </section>

  <!-- ===== NLP SECTION ===== -->
  <section class="box">
    <h2>تحسين النصوص الإعلامية</h2>

    <textarea id="nlpInput" placeholder="اكتب النص هنا..."></textarea>

    <button onclick="runNLP()" class="btn">
      تحسين النص
    </button>

    <div id="nlpOutput" class="output"></div>
  </section>

  <script src="script.js"></script>

</body>

</html>
<!-- ===== CONTENT GENERATOR ===== -->

<section class="box">

  <h2>مولد المحتوى الإعلامي</h2>

  <select id="contentType" class="input">

    <option value="مقال">مقال</option>

    <option value="خبر">خبر</option>

    <option value="منشور سوشيال ميديا">منشور سوشيال ميديا</option>

    <option value="تحليل إعلامي">تحليل إعلامي</option>

  </select>

  <select id="contentCat" class="input">

    <option value="التكنولوجيا">التكنولوجيا</option>

    <option value="الرياضة">الرياضة</option>

    <option value="السياسة">السياسة</option>

    <option value="الإعلام الرقمي">الإعلام الرقمي</option>

  </select>

  <input
    type="text"
    id="contentTopic"
    class="input"
    placeholder="اكتب موضوع المحتوى..."
  >

  <button onclick="generateContent()" class="btn">
    توليد المحتوى
  </button>

  <div id="genLoading" class="output" style="display:none">

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <div id="genOutput" class="output">

    <div id="genText"></div>

    <button onclick="copyContent()" class="btn copy-btn">
      نسخ 📋
    </button>

  </div>

</section>


<!-- ===== AUDIENCE ANALYZER ===== -->

<section class="box">

  <h2>تحليل الجمهور والتفاعل</h2>

  <input
    type="text"
    id="analyzeInput"
    class="input"
    placeholder="اكتب عنوان الخبر..."
  >

  <button onclick="analyzeAudience()" class="btn">
    تحليل العنوان
  </button>

  <div id="analyzeOutput" class="output">

    <div class="stats">

      <div class="stat-card">
        <h3 id="scoreViews">0</h3>
        <p>توقع المشاهدات</p>
      </div>

      <div class="stat-card">
        <h3 id="scoreEngage">0%</h3>
        <p>معدل التفاعل</p>
      </div>

      <div class="stat-card">
        <h3 id="scoreShare">0</h3>
        <p>المشاركات</p>
      </div>

    </div>

    <div id="analyzeAIText" class="analyze-text"></div>

  </div>

</section>
